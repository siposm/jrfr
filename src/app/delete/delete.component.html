<h4>Delete developer</h4>
<select [(ngModel)]="developer" class="form-select mb-2">
    <option
        [ngValue]="dev"
        [disabled]="dev.name.includes('Select')"
        *ngFor="let dev of service.developers"
    >
        {{ dev.name }}
    </option>
</select>
<button class="btn btn-sm btn-danger" (click)="delete()" [disabled]="developer.name.includes('Select')">
    Delete developer
</button>
