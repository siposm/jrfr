<div class="card me-3 mb-3" style="width: 18rem;">
    <h5 class="card-header text-center">{{ skill.id | slice:0:8 }}</h5>
    <img src="https://cdn-icons-png.flaticon.com/512/10438/10438277.png" class="card-img-top mt-3" alt="skill image">
    <div class="card-body">
        <h5 class="card-title">{{ skill.name }}</h5>
        <p class="card-text">{{ skill.description }}</p>
        <p class="card-text">
            <small class="text-body-secondary">
                <a routerLink="/list/{{skill.name}}">
                    Used by {{ countDevsForSpecificSkill() }} devs.
                </a>
            </small>
        </p>
    </div>
    <div class="card-footer text-body-secondary">
        <button class="btn btn-sm btn-warning" (click)="skillService.loadForEdit(skill)" data-bs-toggle="modal" data-bs-target="#skillEditModal">
            <i class="bi bi-pencil-square"></i>
        </button>
        <button class="btn btn-sm btn-danger ms-2" (click)="skillService.delete(skill)" *ngIf="authService.isLoggedIn()">
            <i class="bi bi-trash"></i>
        </button>
    </div>
</div>
